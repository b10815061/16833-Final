/**:
  ros__parameters:
    frontend:
      color_image_topic: "color/image_raw"
      color_camera_info: "color/camera_info"
      depth_image_topic: "aligned_depth_to_color/image_raw"
      odom_topic: "odom"
      sensor_base_frame_id: "camera_link"
      sensor_type: "rgbd"
      inter_robot_loop_closure_budget: 1
      inter_robot_detection_period_sec: 5
      max_queue_size: 10
      similarity_threshold: 0.75
      global_descriptors_topic: "global_descriptors"
      image_crop_size: 376
      intra_loop_min_inbetween_keyframes: 20
      pnp_min_inliers: 15
      detection_publication_period_sec: 1.0
      detection_publication_max_elems_per_msg: 10
      enable_intra_robot_loop_closures: true
      keyframe_generation_ratio_threshold: 0.8
      use_vertex_cover_selection: true
      map_manager_process_period_ms: 100
      enable_sparsification: true
      # Use the standalone CosPlace server so ResNet18 inference runs in a
      # separate process (with GPU if available), eliminating CPU contention
      # with RTAB-Map odometry during multi-agent experiments.
      global_descriptor_technique: "cosplace_server"
      nn_checkpoint: "models/resnet18_64_imagenet.pth"
      cosplace_server:
        server_address: "tcp://localhost:5556"
        timeout_ms: 5000
    neighbor_management:
      enable_neighbor_monitoring: true
      max_heartbeat_delay_sec: 5.0
      init_delay_sec: 5.0
      heartbeat_period_sec: 1.0
    backend:
      pose_graph_optimization_start_period_ms: 5000
      pose_graph_optimization_loop_period_ms: 100
      max_waiting_time_sec: 60
      enable_broadcast_tf_frames: true
    evaluation:
      enable_logs: true
      log_folder: "results/tum/rgbd_dataset_freiburg1_desk/baseline_placeholder"
      enable_gps_recording: false
      enable_sparsification_comparison: false
      enable_pose_timestamps_recording: true
    visualization:
      enable: true
      publishing_period_ms: 1000
